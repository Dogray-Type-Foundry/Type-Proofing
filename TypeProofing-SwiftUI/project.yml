name: TypeProofing
options:
  bundleIdPrefix: com.dograytype
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  CompactSlider:
    url: https://github.com/buh/CompactSlider.git
    from: "2.1.0"

schemes:
  TypeProofing:
    build:
      targets:
        TypeProofing: all
        TypeProofingTests: [test]
        TypeProofingUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TypeProofingTests
        - TypeProofingUITests
    archive:
      config: Release

targets:
  TypeProofing:
    type: application
    platform: macOS
    sources:
      - path: TypeProofing/Sources
      - path: TypeProofing/Resources
        buildPhase: resources
        excludes:
          - "*.icon"
      - path: TypeProofing/Resources/TypeProofing.icon
        buildPhase: resources
        type: folder
    entitlements:
      path: TypeProofing/TypeProofing.entitlements
    info:
      path: TypeProofing/Info.plist
      properties:
        CFBundleIconFile: TypeProofing
        CFBundleIconName: TypeProofing
        CFBundleDisplayName: "Type Proofing"
        LSApplicationCategoryType: "public.app-category.graphics-design"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dograytype.typeproofing
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_ENTITLEMENTS: TypeProofing/TypeProofing.entitlements
        # Native Rust library
        LIBRARY_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/NativeLib"
        SWIFT_INCLUDE_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/NativeLib/include"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-ltpnative"
    dependencies:
      - package: CompactSlider
    preBuildScripts: []
    postBuildScripts: []

  TypeProofingTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TypeProofingTests
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: YES
        LIBRARY_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/NativeLib"
        SWIFT_INCLUDE_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/NativeLib/include"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-ltpnative"
    dependencies:
      - target: TypeProofing

  TypeProofingUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: TypeProofingUITests
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: TypeProofing
